
# Production reverse proxy sketch for Maraaj Intelligence Core
# TLS 1.3 termination expected at edge (Cloudflare / nginx).

upstream mic_api { server api:4000; }
upstream mic_admin { server admin:3001; }
upstream mic_web { server web:3000; }

server {
  listen 443 ssl http2;
  server_name api.maraaj.tech;
  ssl_protocols TLSv1.3;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  # Optional mTLS for trusted clients:
  # ssl_verify_client optional;
  location / {
    proxy_pass http://mic_api;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl http2;
  server_name console.maraaj.tech;
  ssl_protocols TLSv1.3;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  location / { proxy_pass http://mic_admin; }
}

server {
  listen 443 ssl http2;
  server_name go.maraaj.tech;
  ssl_protocols TLSv1.3;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  location / { proxy_pass http://mic_web; }
}
