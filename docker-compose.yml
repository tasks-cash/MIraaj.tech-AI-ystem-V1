services:
  # Legacy/pre-existing Next.js app. Not part of the default AI-system runtime.
  # Start only with: docker compose --profile web up -d web
  web:
    profiles: ["web"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: base
    command: sh -c "pnpm install --frozen-lockfile && pnpm dev:web"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3200}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4200}
    ports:
      - "3200:3200"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/apps/web/.next
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    command: sh -c "pnpm install --frozen-lockfile && pnpm dev:api"
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_HOST: 0.0.0.0
      API_PORT: "4200"
      MONGODB_URI: mongodb://mongo:27017/miraaj
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8200
      AI_SERVICE_HOST: ${AI_SERVICE_HOST:-127.0.0.1}
      AI_SERVICE_PORT: "8200"
      AI_SERVICE_ID: ${AI_SERVICE_ID:-miraaj-api}
      AI_SERVICE_INTERNAL_SECRET: ${AI_SERVICE_INTERNAL_SECRET:?AI_SERVICE_INTERNAL_SECRET is required}
      AI_SERVICE_REQUEST_TIMEOUT_MS: ${AI_SERVICE_REQUEST_TIMEOUT_MS:-5000}
      AI_SERVICE_REPLAY_WINDOW_SECONDS: ${AI_SERVICE_REPLAY_WINDOW_SECONDS:-120}
      AI_SERVICE_VERSION: ${AI_SERVICE_VERSION:-0.1.0}
      TEMPORARY_ADMIN_TOKEN_ENABLED: ${TEMPORARY_ADMIN_TOKEN_ENABLED:-true}
      ALLOW_TEMPORARY_ADMIN_TOKEN_IN_PRODUCTION: ${ALLOW_TEMPORARY_ADMIN_TOKEN_IN_PRODUCTION:-false}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:?ADMIN_API_TOKEN is required}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://127.0.0.1:9200}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-miraaj-media}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-miraaj-local}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      S3_FORCE_PATH_STYLE: "true"
      ENCRYPTION_KEY_ID: ${ENCRYPTION_KEY_ID:-local-development-v1}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:?ENCRYPTION_MASTER_KEY is required}
      MEDIA_MAX_IMAGE_BYTES: ${MEDIA_MAX_IMAGE_BYTES:-15728640}
      MEDIA_MAX_PDF_BYTES: ${MEDIA_MAX_PDF_BYTES:-26214400}
      MEDIA_UPLOAD_SESSION_TTL_SECONDS: ${MEDIA_UPLOAD_SESSION_TTL_SECONDS:-1800}
      MEDIA_PRESIGNED_UPLOAD_TTL_SECONDS: ${MEDIA_PRESIGNED_UPLOAD_TTL_SECONDS:-900}
      MEDIA_PRESIGNED_READ_TTL_SECONDS: ${MEDIA_PRESIGNED_READ_TTL_SECONDS:-120}
      MEDIA_MAX_RETRIES: ${MEDIA_MAX_RETRIES:-3}
      MEDIA_WORKER_CONCURRENCY: ${MEDIA_WORKER_CONCURRENCY:-2}
      CONFIDENCE_AUTO_COMPLETE_MIN: ${CONFIDENCE_AUTO_COMPLETE_MIN:-0.82}
      CONFIDENCE_REVIEW_MIN: ${CONFIDENCE_REVIEW_MIN:-0.5}
      OCR_LANGUAGES_DEFAULT: ${OCR_LANGUAGES_DEFAULT:-ara+eng+fra}
      OCR_LANGUAGES_INSTALLED: ${OCR_LANGUAGES_INSTALLED:-ara,eng,fra,spa,deu,por,ita,nld,tur,rus}
      OCR_MAX_LANGUAGES_PER_JOB: ${OCR_MAX_LANGUAGES_PER_JOB:-4}
      BULLMQ_VALIDATE_QUEUE: ${BULLMQ_VALIDATE_QUEUE:-miraaj.ai.media.validate}
      BULLMQ_ANALYZE_QUEUE: ${BULLMQ_ANALYZE_QUEUE:-miraaj.ai.media.analyze}
      BULLMQ_DEAD_LETTER_QUEUE: ${BULLMQ_DEAD_LETTER_QUEUE:-miraaj.ai.media.dead-letter}
      VISION_PROVIDER_ENABLED: ${VISION_PROVIDER_ENABLED:-false}
      AI_INTELLIGENCE_QUEUE_NAME: ${AI_INTELLIGENCE_QUEUE_NAME:-miraaj.ai.intelligence}
      AI_INTELLIGENCE_DLQ_NAME: ${AI_INTELLIGENCE_DLQ_NAME:-miraaj.ai.intelligence.dead-letter}
      AI_INTELLIGENCE_WORKER_CONCURRENCY: ${AI_INTELLIGENCE_WORKER_CONCURRENCY:-2}
      AI_INTELLIGENCE_MAX_RETRIES: ${AI_INTELLIGENCE_MAX_RETRIES:-3}
      AI_INTELLIGENCE_TIMEOUT_SECONDS: ${AI_INTELLIGENCE_TIMEOUT_SECONDS:-120}
      AI_INTELLIGENCE_STALE_SECONDS: ${AI_INTELLIGENCE_STALE_SECONDS:-300}
      SERVICE_MATCH_AUTO_APPROVE_MIN: ${SERVICE_MATCH_AUTO_APPROVE_MIN:-0.85}
      SERVICE_MATCH_REVIEW_MIN: ${SERVICE_MATCH_REVIEW_MIN:-0.55}
      SERVICE_MATCH_PRIMARY_LIMIT: ${SERVICE_MATCH_PRIMARY_LIMIT:-10}
      SERVICE_MATCH_SUPPORTING_LIMIT: ${SERVICE_MATCH_SUPPORTING_LIMIT:-15}
      SERVICE_MATCH_OPTIONAL_LIMIT: ${SERVICE_MATCH_OPTIONAL_LIMIT:-10}
      SERVICE_MATCH_FUTURE_LIMIT: ${SERVICE_MATCH_FUTURE_LIMIT:-10}
      SERVICE_MATCH_DECISION_MAKER_MIN: ${SERVICE_MATCH_DECISION_MAKER_MIN:-0.65}
      SERVICE_MATCH_PROFESSIONAL_CONTEXT_MIN: ${SERVICE_MATCH_PROFESSIONAL_CONTEXT_MIN:-0.65}
      AI_CAMPAIGN_QUEUE_NAME: ${AI_CAMPAIGN_QUEUE_NAME:-miraaj.ai.campaigns}
      AI_CAMPAIGN_DLQ_NAME: ${AI_CAMPAIGN_DLQ_NAME:-miraaj.ai.campaigns.dead-letter}
      AI_CAMPAIGN_WORKER_CONCURRENCY: ${AI_CAMPAIGN_WORKER_CONCURRENCY:-2}
      AI_CAMPAIGN_MAX_RETRIES: ${AI_CAMPAIGN_MAX_RETRIES:-3}
      AI_CAMPAIGN_TIMEOUT_SECONDS: ${AI_CAMPAIGN_TIMEOUT_SECONDS:-180}
      AI_CAMPAIGN_STALE_SECONDS: ${AI_CAMPAIGN_STALE_SECONDS:-420}
      AI_CAMPAIGN_RECONCILE_INTERVAL_SECONDS: ${AI_CAMPAIGN_RECONCILE_INTERVAL_SECONDS:-60}
      AI_CAMPAIGN_PROVIDER: ${AI_CAMPAIGN_PROVIDER:-disabled}
      AI_CAMPAIGN_MODEL: ${AI_CAMPAIGN_MODEL:-}
      AI_CAMPAIGN_PROVIDER_TIMEOUT_SECONDS: ${AI_CAMPAIGN_PROVIDER_TIMEOUT_SECONDS:-90}
      AI_CAMPAIGN_PROVIDER_MAX_RETRIES: ${AI_CAMPAIGN_PROVIDER_MAX_RETRIES:-2}
      AI_CAMPAIGN_MAX_INPUT_CHARS: ${AI_CAMPAIGN_MAX_INPUT_CHARS:-50000}
      AI_CAMPAIGN_MAX_OUTPUT_CHARS: ${AI_CAMPAIGN_MAX_OUTPUT_CHARS:-100000}
      AI_TRANSLATION_PROVIDER: ${AI_TRANSLATION_PROVIDER:-disabled}
      AI_TRANSLATION_MODEL: ${AI_TRANSLATION_MODEL:-}
      AI_TRANSLATION_TIMEOUT_SECONDS: ${AI_TRANSLATION_TIMEOUT_SECONDS:-60}
      AI_TRANSLATION_MAX_RETRIES: ${AI_TRANSLATION_MAX_RETRIES:-2}
      CAMPAIGN_MAX_SERVICES: ${CAMPAIGN_MAX_SERVICES:-10}
      CAMPAIGN_MAX_PLATFORMS: ${CAMPAIGN_MAX_PLATFORMS:-8}
      CAMPAIGN_MAX_LANGUAGES: ${CAMPAIGN_MAX_LANGUAGES:-10}
      CAMPAIGN_MAX_LOCALES: ${CAMPAIGN_MAX_LOCALES:-10}
      CAMPAIGN_MAX_PLATFORM_VARIANTS: ${CAMPAIGN_MAX_PLATFORM_VARIANTS:-40}
      CAMPAIGN_MAX_LANGUAGE_VARIANTS: ${CAMPAIGN_MAX_LANGUAGE_VARIANTS:-20}
      CAMPAIGN_MAX_HASHTAGS_PER_VARIANT: ${CAMPAIGN_MAX_HASHTAGS_PER_VARIANT:-20}
      CAMPAIGN_MAX_KEYWORDS_PER_VARIANT: ${CAMPAIGN_MAX_KEYWORDS_PER_VARIANT:-30}
      CAMPAIGN_QUALITY_HIGH_MIN: ${CAMPAIGN_QUALITY_HIGH_MIN:-0.88}
      CAMPAIGN_QUALITY_REVIEW_MIN: ${CAMPAIGN_QUALITY_REVIEW_MIN:-0.65}
      CAMPAIGN_BRAND_SCORE_MIN: ${CAMPAIGN_BRAND_SCORE_MIN:-0.80}
      CAMPAIGN_COMPLIANCE_SCORE_MIN: ${CAMPAIGN_COMPLIANCE_SCORE_MIN:-0.95}
      CAMPAIGN_LANGUAGE_SCORE_MIN: ${CAMPAIGN_LANGUAGE_SCORE_MIN:-0.78}
      CAMPAIGN_SEMANTIC_PRESERVATION_MIN: ${CAMPAIGN_SEMANTIC_PRESERVATION_MIN:-0.90}
      CAMPAIGN_AUDIENCE_FIT_MIN: ${CAMPAIGN_AUDIENCE_FIT_MIN:-0.75}
      CAMPAIGN_AUTO_APPROVE_ENABLED: ${CAMPAIGN_AUTO_APPROVE_ENABLED:-false}
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ai-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4200/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8200",
        "--reload"
      ]
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AI_SERVICE_HOST: 0.0.0.0
      AI_SERVICE_PORT: "8200"
      AI_SERVICE_ID: ${AI_SERVICE_ID:-miraaj-api}
      AI_SERVICE_ALLOWED_IDS: ${AI_SERVICE_ALLOWED_IDS:-miraaj-api}
      AI_SERVICE_INTERNAL_SECRET: ${AI_SERVICE_INTERNAL_SECRET:?AI_SERVICE_INTERNAL_SECRET is required}
      AI_SERVICE_URL: http://ai-service:8200
      AI_SERVICE_REQUEST_TIMEOUT_MS: ${AI_SERVICE_REQUEST_TIMEOUT_MS:-5000}
      AI_SERVICE_REPLAY_WINDOW_SECONDS: ${AI_SERVICE_REPLAY_WINDOW_SECONDS:-120}
      AI_SERVICE_VERSION: ${AI_SERVICE_VERSION:-0.1.0}
      REDIS_URL: redis://redis:6379
      AI_SERVICE_REDIS_REQUIRED: ${AI_SERVICE_REDIS_REQUIRED:-false}
      AI_SERVICE_DEPENDENCY_TIMEOUT_MS: ${AI_SERVICE_DEPENDENCY_TIMEOUT_MS:-1000}
      BUILD_ID: ${BUILD_ID:-}
      MEDIA_MAX_IMAGE_BYTES: ${MEDIA_MAX_IMAGE_BYTES:-15728640}
      MEDIA_MAX_PDF_BYTES: ${MEDIA_MAX_PDF_BYTES:-26214400}
      MEDIA_MAX_IMAGE_WIDTH: ${MEDIA_MAX_IMAGE_WIDTH:-12000}
      MEDIA_MAX_IMAGE_HEIGHT: ${MEDIA_MAX_IMAGE_HEIGHT:-12000}
      MEDIA_MAX_IMAGE_PIXELS: ${MEDIA_MAX_IMAGE_PIXELS:-50000000}
      MEDIA_MAX_PDF_PAGES: ${MEDIA_MAX_PDF_PAGES:-25}
      MEDIA_MAX_TOTAL_RENDERED_PIXELS: ${MEDIA_MAX_TOTAL_RENDERED_PIXELS:-150000000}
      MEDIA_OCR_TIMEOUT_SECONDS: ${MEDIA_OCR_TIMEOUT_SECONDS:-90}
      MEDIA_VISION_TIMEOUT_SECONDS: ${MEDIA_VISION_TIMEOUT_SECONDS:-90}
      MEDIA_NORMALIZED_IMAGE_FORMAT: ${MEDIA_NORMALIZED_IMAGE_FORMAT:-webp}
      MEDIA_NORMALIZED_IMAGE_QUALITY: ${MEDIA_NORMALIZED_IMAGE_QUALITY:-90}
      MEDIA_FETCH_ALLOWED_HOSTS: ${MEDIA_FETCH_ALLOWED_HOSTS:-localhost,127.0.0.1,minio}
      MEDIA_FETCH_TIMEOUT_SECONDS: ${MEDIA_FETCH_TIMEOUT_SECONDS:-30}
      MEDIA_FETCH_MAX_BYTES: ${MEDIA_FETCH_MAX_BYTES:-26214400}
      OCR_LANGUAGES_DEFAULT: ${OCR_LANGUAGES_DEFAULT:-ara+eng+fra}
      OCR_LANGUAGES_INSTALLED: ${OCR_LANGUAGES_INSTALLED:-ara,eng,fra,spa,deu,por,ita,nld,tur,rus}
      OCR_MAX_LANGUAGES_PER_JOB: ${OCR_MAX_LANGUAGES_PER_JOB:-4}
      OCR_PRELIMINARY_LANGUAGES: ${OCR_PRELIMINARY_LANGUAGES:-eng}
      OCR_MIN_CONFIDENCE: ${OCR_MIN_CONFIDENCE:-0.55}
      OCR_RETRY_MIN_CONFIDENCE: ${OCR_RETRY_MIN_CONFIDENCE:-0.35}
      VISION_PROVIDER_ENABLED: ${VISION_PROVIDER_ENABLED:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-90}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-1}
      GEMINI_TEMPERATURE: ${GEMINI_TEMPERATURE:-0.1}
      GEMINI_MAX_OUTPUT_TOKENS: ${GEMINI_MAX_OUTPUT_TOKENS:-4096}
      AI_REASONING_PROVIDER: ${AI_REASONING_PROVIDER:-disabled}
      AI_REASONING_MODEL: ${AI_REASONING_MODEL:-gemini-2.0-flash}
      AI_REASONING_TIMEOUT_SECONDS: ${AI_REASONING_TIMEOUT_SECONDS:-60}
      AI_REASONING_MAX_RETRIES: ${AI_REASONING_MAX_RETRIES:-1}
      AI_REASONING_MAX_INPUT_CHARS: ${AI_REASONING_MAX_INPUT_CHARS:-20000}
      AI_CAMPAIGN_PROVIDER: ${AI_CAMPAIGN_PROVIDER:-disabled}
      AI_CAMPAIGN_MODEL: ${AI_CAMPAIGN_MODEL:-gemini-2.0-flash}
      AI_CAMPAIGN_PROVIDER_TIMEOUT_SECONDS: ${AI_CAMPAIGN_PROVIDER_TIMEOUT_SECONDS:-90}
      AI_CAMPAIGN_PROVIDER_MAX_RETRIES: ${AI_CAMPAIGN_PROVIDER_MAX_RETRIES:-1}
      AI_CAMPAIGN_MAX_INPUT_CHARS: ${AI_CAMPAIGN_MAX_INPUT_CHARS:-50000}
      AI_CAMPAIGN_MAX_OUTPUT_CHARS: ${AI_CAMPAIGN_MAX_OUTPUT_CHARS:-100000}
      AI_TRANSLATION_PROVIDER: ${AI_TRANSLATION_PROVIDER:-disabled}
      AI_TRANSLATION_MODEL: ${AI_TRANSLATION_MODEL:-gemini-2.0-flash}
      AI_TRANSLATION_TIMEOUT_SECONDS: ${AI_TRANSLATION_TIMEOUT_SECONDS:-60}
      AI_TRANSLATION_MAX_RETRIES: ${AI_TRANSLATION_MAX_RETRIES:-1}
    ports:
      - "127.0.0.1:8200:8200"
    volumes:
      - ./apps/ai-service/app:/app/app
      - ./apps/ai-service/tests:/app/tests
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "127.0.0.1:27020:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6383:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-miraaj-local}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-local-development-storage-secret}
    ports:
      - "127.0.0.1:9200:9000"
      - "127.0.0.1:9201:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000
        "$${S3_ACCESS_KEY_ID:-miraaj-local}"
        "$${S3_SECRET_ACCESS_KEY:-local-development-storage-secret}"; do sleep 1; done;
        mc mb --ignore-existing "local/$${S3_BUCKET:-miraaj-media}";
        mc anonymous set none "local/$${S3_BUCKET:-miraaj-media}";
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-miraaj-local}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-local-development-storage-secret}
      S3_BUCKET: ${S3_BUCKET:-miraaj-media}

volumes:
  web_node_modules:
  web_next:
  api_node_modules:
  mongo_data:
  redis_data:
  minio_data:
